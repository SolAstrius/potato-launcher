name: Build launcher

on:
  workflow_dispatch:
    inputs:
      upload_launchers:
        description: "Upload launcher artifacts via backend API"
        type: boolean
        required: false
        default: false
  workflow_run:
    workflows: ['Check']
    types:
      - completed

defaults:
  run:
    shell: bash

env:
  UPLOAD_LAUNCHERS: ${{ (github.ref == 'refs/heads/master' || (github.event_name == 'workflow_dispatch' && inputs.upload_launchers)) && vars.BACKEND_API_BASE != '' && secrets.ADMIN_SECRET_TOKEN != '' }}

jobs:
  binaries:
    name: Build binaries
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['windows-latest', 'ubuntu-latest', 'macos-latest']
    env:
      LAUNCHER_NAME: ${{ vars.LAUNCHER_NAME }}
      LAUNCHER_APP_ID: ${{ vars.LAUNCHER_APP_ID }}
      LAUNCHER_ICON: ${{ vars.LAUNCHER_ICON }}
      LAUNCHER_DESCRIPTION: ${{ vars.LAUNCHER_DESCRIPTION }}
      LAUNCHER_KEYWORDS: ${{ vars.LAUNCHER_KEYWORDS }}
      INSTANCE_MANIFEST_URLS: ${{ vars.INSTANCE_MANIFEST_URLS }}
      BACKEND_API_BASE: ${{ vars.BACKEND_API_BASE }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: ./scripts/ci/install-linux-deps.sh

      - name: Install packaging dependencies
        run: ./scripts/ci/install-packaging-deps.sh

      - name: Resolve build environment
        run: ./scripts/ci/set-build-env.sh

      - name: Configure packaging
        run: python packaging/configure.py

      - name: Build the launcher
        run: ./scripts/ci/build-launcher.sh

      - name: Upload launcher artifacts via backend API
        if: ${{ env.UPLOAD_LAUNCHERS == 'true' }}
        env:
          ADMIN_SECRET_TOKEN: ${{ secrets.ADMIN_SECRET_TOKEN }}
        run: ./scripts/ci/upload-launcher.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launcher-${{ matrix.os }}
          path: build/*

  flatpak:
    name: Build Flatpak package
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/andyholmes/flatter/freedesktop:24.08
      options: --privileged
    env:
      VERSION: ${{ github.sha }}
      LAUNCHER_NAME: ${{ vars.LAUNCHER_NAME }}
      LAUNCHER_APP_ID: ${{ vars.LAUNCHER_APP_ID }}
      LAUNCHER_ICON: ${{ vars.LAUNCHER_ICON }}
      LAUNCHER_DESCRIPTION: ${{ vars.LAUNCHER_DESCRIPTION }}
      LAUNCHER_KEYWORDS: ${{ vars.LAUNCHER_KEYWORDS }}
      INSTANCE_MANIFEST_URLS: ${{ vars.INSTANCE_MANIFEST_URLS }}
      BACKEND_API_BASE: ${{ vars.BACKEND_API_BASE }}
      GPG_PUBLIC_KEY: ${{ vars.GPG_PUBLIC_KEY }}

    steps:
      - uses: actions/checkout@v5

      - name: Install packaging dependencies
        run: ./scripts/ci/install-packaging-deps.sh

      - name: Install flatpak-cargo-generator dependencies
        run: dnf install -y python3-aiohttp python3-toml wget

      - name: Generate cargo sources
        run: ./scripts/ci/flatpak-sources.sh

      - name: Generate manifest
        run: ./scripts/ci/flatpak-manifest.sh

      - name: Setup GPG
        id: gpg
        # `if` doesn't see secrets directly, so the key is mirrored into env first.
        if: ${{ github.ref == 'refs/heads/master' && env.GPG_PRIVATE_KEY != '' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Install Rust SDK
        run: flatpak install runtime/org.freedesktop.Sdk.Extension.rust-stable/x86_64/24.08 --noninteractive

      - name: Build Flatpak package
        id: flatpak
        uses: andyholmes/flatter@main
        with:
          files: |
            packaging/flatpak/manifest.yml
          arch: x86_64
          gpg-sign: ${{ steps.gpg.outputs.fingerprint }}
          upload-bundles: true

      - name: Upload Flatpak artifacts via backend API
        if: ${{ env.UPLOAD_LAUNCHERS == 'true' }}
        env:
          ADMIN_SECRET_TOKEN: ${{ secrets.ADMIN_SECRET_TOKEN }}
        run: ./scripts/ci/upload-flatpak.sh
